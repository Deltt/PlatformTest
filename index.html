<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>server test</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --panel: #141414;
      --border: #2a2a2a;
      --text: #c8c8c8;
      --dim: #555;
      --accent: #00e5a0;
      --err: #ff4d4d;
      --warn: #f0c040;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      min-height: 100vh;
      padding: 32px;
    }

    h1 {
      font-size: 11px;
      font-weight: 400;
      color: var(--dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 32px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    h1 span {
      color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 20px;
    }

    .card-title {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 4px;
      letter-spacing: 0.08em;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: var(--accent);
    }

    button {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 18px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      margin-top: 4px;
    }

    button:hover {
      background: var(--accent);
      color: #000;
    }

    button:active {
      opacity: 0.7;
    }

    button.danger {
      border-color: var(--err);
      color: var(--err);
    }

    button.danger:hover {
      background: var(--err);
      color: #000;
    }

    #log {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 16px;
      height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-title {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
    }

    .entry {
      display: grid;
      grid-template-columns: auto auto 1fr;
      gap: 12px;
      align-items: baseline;
      line-height: 1.5;
    }

    .entry .ts {
      color: var(--dim);
      font-size: 11px;
    }

    .entry .method {
      color: var(--warn);
      min-width: 60px;
    }

    .entry .msg {
      color: var(--text);
    }

    .entry.ok .msg {
      color: var(--accent);
    }

    .entry.err .msg {
      color: var(--err);
    }

    .empty {
      color: var(--dim);
      font-size: 11px;
      font-style: italic;
    }
  </style>
</head>

<body>

  <h1>// <span>axum</span> dev console — platformserver-n7cp.onrender.com</h1>

  <div class="grid">

    <!-- LOGIN -->
    <div class="card">
      <div class="card-title">POST /login_request</div>
      <div class="field"><label>username</label><input id="ln-user"></div>
      <div class="field"><label>password</label><input id="ln-pass" type="password"></div>
      <button onclick="doLogin()">send</button>
    </div>

    <!-- CREATE ACCOUNT -->
    <div class="card">
      <div class="card-title">POST /createaccount</div>
      <div class="field"><label>username</label><input id="ca-user"></div>
      <div class="field"><label>password</label><input id="ca-pass" type="password"></div>
      <button onclick="doCreateAccount()">send</button>
    </div>

    <!-- ME -->
    <div class="card">
      <div class="card-title">GET /me</div>
      <p style="color:var(--dim);font-size:11px;margin-bottom:12px;">uses current session cookie</p>
      <button onclick="doMe()">send</button>
    </div>

    <!-- DELETE ACCOUNT -->
    <div class="card">
      <div class="card-title">POST /deleteaccount</div>
      <p style="color:var(--dim);font-size:11px;margin-bottom:12px;">deletes account of current session</p>
      <button class="danger" onclick="doDeleteAccount()">send</button>
    </div>

  </div>

  <div class="log-title">// request log</div>
  <div id="log"><span class="empty">no requests yet</span></div>

  <script>
    const BASE = 'https://api.genericplatform.work.gd';
    const log = document.getElementById('log');

    function ts() {
      return new Date().toTimeString().slice(0, 8);
    }

    function addLog(method, msg, ok) {
      const empty = log.querySelector('.empty');
      if (empty) empty.remove();

      const e = document.createElement('div');
      e.className = 'entry ' + (ok === true ? 'ok' : ok === false ? 'err' : '');
      e.innerHTML = `<span class="ts">${ts()}</span><span class="method">${method}</span><span class="msg">${msg}</span>`;
      log.appendChild(e);
      log.scrollTop = log.scrollHeight;
    }

    function buildBody(username, password) {
      const enc = new TextEncoder();
      const u = enc.encode(username);
      const p = enc.encode(password);
      const buf = new Uint8Array(1 + u.length + 1 + p.length);
      buf[0] = u.length;
      buf.set(u, 1);
      buf[1 + u.length] = p.length;
      buf.set(p, 2 + u.length);
      return buf;
    }

    function getCsrf() {
      return document.cookie.split('; ').find(r => r.startsWith('csrf_token='))?.split('=')[1] ?? '';
    }

    async function doLogin() {
      const body = buildBody(
        document.getElementById('ln-user').value,
        document.getElementById('ln-pass').value
      );
      try {
        const res = await fetch(`${BASE}/loginrequest`, {
          method: 'POST',
          body,
          credentials: 'include',
          headers: { 'Content-Type': 'application/octet-stream' },
        });
        addLog('POST /loginrequest', `${res.status} ${res.statusText}`, res.ok);
      } catch (e) {
        addLog('POST /loginrequest', `network error: ${e.message}`, false);
      }
    }

    // async function doMe() {
    //   try {
    //     const res = await fetch(`${BASE}/me`, {
    //       credentials: 'include',
    //     });
    //     addLog('GET /me', `${res.status} ${res.statusText}`, res.ok);
    //   } catch (e) {
    //     addLog('GET /me', `network error: ${e.message}`, false);
    //   }
    // }

    async function doMe() {
      console.log('csrf:', getCsrf());
      try {
        const res = await fetch(`${BASE}/me`, {
          credentials: 'include',
          headers: { 'x-csrf-token': getCsrf() },
        });
        addLog('GET /me', `${res.status} ${res.statusText}`, res.ok);
      } catch (e) {
        addLog('GET /me', `network error: ${e.message}`, false);
      }
    }

    async function doCreateAccount() {
      const body = buildBody(
        document.getElementById('ca-user').value,
        document.getElementById('ca-pass').value
      );
      try {
        const res = await fetch(`${BASE}/createaccount`, {
          method: 'POST',
          body,
          credentials: 'include',
          headers: { 'Content-Type': 'application/octet-stream', 'x-csrf-token': getCsrf() },
        });
        addLog('POST /createaccount', `${res.status} ${res.statusText}`, res.ok);
      } catch (e) {
        addLog('POST /createaccount', `network error: ${e.message}`, false);
      }
    }

    async function doDeleteAccount() {
      try {
        const res = await fetch(`${BASE}/deleteaccount`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'x-csrf-token': getCsrf() },
        });
        addLog('POST /deleteaccount', `${res.status} ${res.statusText}`, res.ok);
      } catch (e) {
        addLog('POST /deleteaccount', `network error: ${e.message}`, false);
      }
    }
  </script>
</body>

</html>
